
        <!DOCTYPE html>
        <html lang="sk">
        <head>
        <meta charset="UTF-8">
        <title>Zoznam drinkov</title>
        <style>
            body {
                background-color: #1e1e2f;
                color: #f0f0f0;
                font-family: 'Arial', sans-serif;
                text-align: center;
                margin: 0;
                padding: 0;
            }
            h1 {
                margin-top: 20px;
                font-size: 3em;
                background: linear-gradient(to right, #ff6ec4, #7873f5);
                -webkit-background-clip: text;
                color: transparent;
            }
            .drink-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
                padding: 20px;
            }
            .drink-card {
                background-color: #2b2b44;
                border-radius: 15px;
                padding: 15px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.5);
                transition: transform 0.3s;
            }
            .drink-card:hover {
                transform: scale(1.05);
            }
            .drink-card img {
                width: 100%;
                border-radius: 10px;
            }
            .stats {
                display: flex;
                justify-content: center;
                gap: 20px;
                margin: 30px 0;
            }
            .stat-box {
                background-color: #3c3c5c;
                padding: 20px;
                border-radius: 10px;
                width: 150px;
            }
        </style>
        </head>
        <body>
        <h1>Zoznam drinkov</h1>
        <div class="drink-grid">

            <div class="drink-card">
                <img src="https://boozeapi.com/api/img/cocktails/563.jpg" alt="The Philosopher">
                <h3>The Philosopher</h3>
            </div>
            
            <div class="drink-card">
                <img src="https://boozeapi.com/api/img/cocktails/152.jpg" alt="Bombay Cassis">
                <h3>Bombay Cassis</h3>

            <div class="drink-card">
